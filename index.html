<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet the Cat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  h1 {
    color: #111111;
    font-size: 2rem;
    margin-bottom: 8px;
    letter-spacing: 1px;
    position: relative;
    z-index: 10;
  }

  .subtitle {
    color: #555555;
    font-size: 0.9rem;
    margin-bottom: 24px;
    position: relative;
    z-index: 10;
  }

  /* The circle is just a decorative ring — NO overflow:hidden */
  .game-container {
    position: relative;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    cursor: crosshair;
    border: 3px solid #cccccc;
    flex-shrink: 0;
    z-index: 2;
  }

  /* Image sits centered inside the ring, overflows freely */
  #cat-img {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 380px;
    height: 380px;
    object-fit: cover;
    border-radius: 50%;
    pointer-events: none;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
    will-change: transform;
    transition: border-radius 0.4s ease;
    z-index: 1;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,0,0,0.1);
    animation: rippleOut 0.5s ease-out forwards;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 3;
  }
  @keyframes rippleOut {
    0%   { width: 0;    height: 0;    opacity: 0.6; }
    100% { width: 80px; height: 80px; opacity: 0;   }
  }

  .heart {
    position: fixed;
    pointer-events: none;
    font-size: 1.4rem;
    animation: floatUp 1.1s ease-out forwards;
    z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0)      scale(1);   }
    100% { opacity: 0; transform: translateY(-110px)  scale(1.4); }
  }

  .purr-text {
    margin-top: 18px;
    color: #111111;
    font-size: 1.3rem;
    height: 32px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 4px;
    position: relative;
    z-index: 10;
  }
  .purr-text.visible { opacity: 1; }
</style>
</head>
<body>

</div>

<div class="purr-text" id="purrText">r r r r r r r</div>

<audio id="engineSound" src="engine.mp3" loop></audio>

<script>
const container = document.getElementById("gameContainer");
const catImg    = document.getElementById("cat-img");
const purrText  = document.getElementById("purrText");
const audio     = document.getElementById("engineSound");

let isPetting = false;
let lastX = 0, lastY = 0;
let scale  = 1;
let volume = 0;
let heartTimer = 0;

// Max scale: enough to fill the screen from a 380px circle
// screen diagonal ~= sqrt(1440^2+900^2) ~ 1700, 1700/380 ~ 4.5
const MAX_SCALE = 5;

function decayLoop() {
  scale  = Math.max(1,   scale  - 0.006);
  volume = Math.max(0,   volume - 0.01);

  applyScale(scale);
  audio.volume = +volume.toFixed(3);

  if (volume <= 0 && !isPetting) {
    audio.pause();
    purrText.classList.remove("visible");
  }

  requestAnimationFrame(decayLoop);
}
decayLoop();

function applyScale(s) {
  catImg.style.transform = "translate(-50%, -50%) scale(" + s.toFixed(3) + ")";
  // Gradually lose the circular clip as image expands beyond the ring
  const radius = Math.max(0, 50 - (s - 1) * 25);
  catImg.style.borderRadius = radius + "%";
}

function onPet(x, y) {
  const dx = x - lastX;
  const dy = y - lastY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 3) return;

  scale  = Math.min(MAX_SCALE, scale  + dist * 0.002);
  volume = Math.min(1.0,       volume + dist * 0.003);

  applyScale(scale);

  if (audio.paused && volume > 0.05) {
    audio.play().catch(() => {});
  }
  audio.volume = +volume.toFixed(3);

  if (volume > 0.1) purrText.classList.add("visible");

  spawnRipple(x, y);
  heartTimer += dist;
  if (heartTimer > 120) {
    spawnHeart(x, y);
    heartTimer = 0;
  }

  lastX = x;
  lastY = y;
}

function spawnRipple(x, y) {
  const rect = container.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "ripple";
  el.style.left = (x - rect.left) + "px";
  el.style.top  = (y - rect.top)  + "px";
  container.appendChild(el);
  setTimeout(() => el.remove(), 500);
}

function spawnHeart(x, y) {
  const emojis = ["🖤","✨","💫","⭐","🌸","🎀"];
  const el = document.createElement("div");
  el.className = "heart";
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = (x - 12) + "px";
  el.style.top  = (y - 12) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// Mouse
container.addEventListener("mousedown", (e) => {
  isPetting = true;
  lastX = e.clientX; lastY = e.clientY;
  audio.play().catch(() => {});
});
container.addEventListener("mousemove", (e) => {
  if (!isPetting) return;
  onPet(e.clientX, e.clientY);
});
window.addEventListener("mouseup",      () => { isPetting = false; });
container.addEventListener("mouseleave",() => { isPetting = false; });

// Touch
container.addEventListener("touchstart", (e) => {
  e.preventDefault();
  isPetting = true;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  audio.play().catch(() => {});
}, { passive: false });
container.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (!isPetting) return;
  onPet(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { isPetting = false; });
</script>
