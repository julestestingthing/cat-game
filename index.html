<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet the Cat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Georgia", serif;
    overflow: hidden;
  }
  h1 {
    color: #fff;
    font-size: 2rem;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255,200,100,0.8);
    letter-spacing: 2px;
  }
  .subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .game-container {
    position: relative;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    overflow: hidden;
    cursor: crosshair;
    box-shadow: 0 0 40px rgba(255,200,100,0.3), 0 0 80px rgba(255,150,50,0.1);
    border: 3px solid rgba(255,200,100,0.4);
    transition: box-shadow 0.3s;
  }
  .game-container.purring {
    box-shadow: 0 0 60px rgba(255,200,100,0.8), 0 0 120px rgba(255,150,50,0.4);
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.02); }
  }
  #cat-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    transition: filter 0.3s;
  }
  .game-container.purring #cat-img {
    filter: brightness(1.15) saturate(1.2);
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .happiness-bar-container {
    width: 380px;
    margin-top: 20px;
  }
  .happiness-label {
    color: rgba(255,255,255,0.8);
    font-size: 0.85rem;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .happiness-bar {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .happiness-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77);
    border-radius: 7px;
    transition: width 0.3s ease;
  }
  .purr-text {
    margin-top: 16px;
    color: #ffd93d;
    font-size: 1.4rem;
    height: 36px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 10px rgba(255,217,61,0.8);
    letter-spacing: 3px;
  }
  .purr-text.visible { opacity: 1; }
  .heart {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    animation: floatUp 1.2s ease-out forwards;
    z-index: 999;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    animation: rippleOut 0.6s ease-out forwards;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  @keyframes rippleOut {
    0% { width: 0; height: 0; opacity: 0.8; }
    100% { width: 80px; height: 80px; opacity: 0; }
  }
  .stroke-counter {
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>

    <span>Happiness</span>
    <span id="happinessPercent">0%</span>
  </div>
  <div class="happiness-bar">
    <div class="happiness-fill" id="happinessFill"></div>
  </div>
</div>

<div class="purr-text" id="purrText">P u r r r r r . . .</div>
<div class="stroke-counter" id="strokeCounter">Strokes: 0</div>

<script>
const container = document.getElementById("gameContainer");
const fill = document.getElementById("happinessFill");
const purrText = document.getElementById("purrText");
const happinessPercent = document.getElementById("happinessPercent");
const strokeCounter = document.getElementById("strokeCounter");

let happiness = 0;
let strokes = 0;
let isPetting = false;
let audioCtx = null;
let purrNode = null;
let purrGain = null;
let lastX = 0, lastY = 0;
let purrTimeout = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startPurr() {
  const ctx = getAudioCtx();
  if (purrNode) return;

  purrGain = ctx.createGain();
  purrGain.gain.setValueAtTime(0, ctx.currentTime);
  purrGain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.3);

  const lfo = ctx.createOscillator();
  lfo.frequency.value = 28;
  lfo.type = "sine";

  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 0.5;
  lfo.connect(lfoGain);

  purrNode = ctx.createOscillator();
  purrNode.type = "sawtooth";
  purrNode.frequency.value = 80;

  const filter = ctx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 300;

  lfoGain.connect(purrNode.frequency);
  purrNode.connect(filter);
  filter.connect(purrGain);
  purrGain.connect(ctx.destination);

  lfo.start();
  purrNode.start();
}

function stopPurr() {
  if (!purrNode || !purrGain) return;
  const ctx = getAudioCtx();
  purrGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
  const node = purrNode;
  setTimeout(() => { try { node.stop(); } catch(e){} }, 600);
  purrNode = null;
  purrGain = null;
}

function spawnHeart(x, y) {
  const emojis = ["💛","🧡","💚","✨","⭐","💫"];
  const el = document.createElement("div");
  el.className = "heart";
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = (x - 12) + "px";
  el.style.top = (y - 12) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnRipple(x, y) {
  const rect = container.getBoundingClientRect();
  const el = document.createElement("div");
  el.className = "ripple";
  el.style.left = (x - rect.left) + "px";
  el.style.top = (y - rect.top) + "px";
  container.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

function addHappiness(amount) {
  happiness = Math.min(100, happiness + amount);
  fill.style.width = happiness + "%";
  happinessPercent.textContent = Math.round(happiness) + "%";

  if (happiness >= 30) {
    purrText.classList.add("visible");
    container.classList.add("purring");
    startPurr();
  }

  clearTimeout(purrTimeout);
  purrTimeout = setTimeout(() => {
    purrText.classList.remove("visible");
    container.classList.remove("purring");
    stopPurr();
    happiness = Math.max(0, happiness - 15);
    fill.style.width = happiness + "%";
    happinessPercent.textContent = Math.round(happiness) + "%";
  }, 2000);
}

function onPet(x, y) {
  const dx = x - lastX;
  const dy = y - lastY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist > 5) {
    strokes++;
    strokeCounter.textContent = "Strokes: " + strokes;
    addHappiness(2);
    spawnRipple(x, y);
    if (strokes % 4 === 0) spawnHeart(x, y);
    lastX = x;
    lastY = y;
  }
}

container.addEventListener("mousedown", (e) => {
  isPetting = true;
  lastX = e.clientX;
  lastY = e.clientY;
  getAudioCtx().resume();
});
container.addEventListener("mousemove", (e) => {
  if (!isPetting) return;
  onPet(e.clientX, e.clientY);
});
container.addEventListener("mouseup", () => isPetting = false);
container.addEventListener("mouseleave", () => isPetting = false);

container.addEventListener("touchstart", (e) => {
  e.preventDefault();
  isPetting = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
  getAudioCtx().resume();
}, { passive: false });
container.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (!isPetting) return;
  onPet(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
container.addEventListener("touchend", () => isPetting = false);
</script>
</body>
</html>
